<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VictorThon 2026 Countdown</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Quicksand', sans-serif;
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1.5rem;
    }

    .wrapper {
      text-align: center;
      width: 100%;
      max-width: 660px;
      background: rgba(245, 231, 166, 0.6);
      border-radius: 16px;
      padding: 2rem 1.5rem;
    }

    .title {
      font-size: 1.3rem;
      font-weight: 700;
      color: #284C81;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    .countdown {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .count {
      border-radius: 8px;
      overflow: hidden;
      flex: 1;
      min-width: 85px;
      max-width: 110px;
    }

    .card-top {
      background: #82C1E8;
      padding: 14px 8px 12px;
      font-size: 2.4rem;
      font-weight: 700;
      color: #F5E7A6;
      line-height: 1;
    }

    .card-bot {
      background: #284C81;
      padding: 8px;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #F5E7A6;
    }

    .event-day {
      font-size: 2rem;
      font-weight: 700;
      color: #284C81;
    }

    @media (max-width: 420px) {
      .card-top { font-size: 1.8rem; padding: 10px 6px; }
      .count { min-width: 60px; }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <p class="title">Countdown to VictorThon 2026</p>
    <div class="countdown" id="countdown">
      <div class="count"><div class="card-top" id="weeks">0</div><div class="card-bot">Weeks</div></div>
      <div class="count"><div class="card-top" id="days">0</div><div class="card-bot">Days</div></div>
      <div class="count"><div class="card-top" id="hours">0</div><div class="card-bot">Hours</div></div>
      <div class="count"><div class="card-top" id="minutes">00</div><div class="card-bot">Minutes</div></div>
      <div class="count"><div class="card-top" id="seconds">00</div><div class="card-bot">Seconds</div></div>
    </div>
  </div>

  <script>
    const eventDate = new Date('2026-04-18T10:00:00');

    function pad(n) { return String(n).padStart(2, '0'); }

    function updateCountdown() {
      const now = new Date();
      const timeDiff = eventDate - now;

      if (timeDiff <= 0) {
        document.getElementById('countdown').innerHTML = '<div class="event-day">Happy VictorThon!</div>';
        return;
      }

      const weeks   = Math.floor(timeDiff / (1000 * 60 * 60 * 24 * 7));
      const days    = Math.floor((timeDiff % (1000 * 60 * 60 * 24 * 7)) / (1000 * 60 * 60 * 24));
      const hours   = Math.floor((timeDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((timeDiff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((timeDiff % (1000 * 60)) / 1000);

      document.getElementById('weeks').textContent   = weeks;
      document.getElementById('days').textContent    = days;
      document.getElementById('hours').textContent   = hours;
      document.getElementById('minutes').textContent = pad(minutes);
      document.getElementById('seconds').textContent = pad(seconds);
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();
  </script>
</body>
</html>
